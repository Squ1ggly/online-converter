<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bg)"/>

  <!-- Upper-left image frame -->
  <rect x="3" y="3" width="11" height="9" rx="2" ry="2" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1"/>
  <!-- Sun -->
  <circle cx="5.5" cy="5.5" r="1.2" fill="rgba(255,255,255,0.85)"/>
  <!-- Mountain -->
  <polyline points="3.5,11.5 6.5,8 9,10 10.5,8.5 13.5,11.5" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="1" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Lower-right image frame -->
  <rect x="18" y="20" width="11" height="9" rx="2" ry="2" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1"/>
  <!-- Sun -->
  <circle cx="20.5" cy="22.5" r="1.2" fill="rgba(255,255,255,0.85)"/>
  <!-- Mountain -->
  <polyline points="18.5,28.5 21.5,25 24,27 25.5,25.5 28.5,28.5" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="1" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Arrow right -->
  <path d="M15 13 L19 13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M17.5 11.5 L19.5 13 L17.5 14.5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow left -->
  <path d="M13 19 L17 19" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M14.5 17.5 L12.5 19 L14.5 20.5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
