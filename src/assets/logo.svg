<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Upper-left image frame -->
  <rect x="7" y="7" width="22" height="18" rx="3" ry="3" fill="rgba(255,255,255,0.1)" stroke="white" stroke-width="1.5"/>
  <!-- Sun circle -->
  <circle cx="12" cy="12" r="2.5" fill="rgba(255,255,255,0.8)"/>
  <!-- Mountain path -->
  <polyline points="8,24 14,17 19,21 22,18 28,24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Lower-right image frame -->
  <rect x="35" y="39" width="22" height="18" rx="3" ry="3" fill="rgba(255,255,255,0.1)" stroke="white" stroke-width="1.5"/>
  <!-- Sun circle -->
  <circle cx="40" cy="44" r="2.5" fill="rgba(255,255,255,0.8)"/>
  <!-- Mountain path -->
  <polyline points="36,56 42,49 47,53 50,50 56,56" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Conversion arrows in the middle -->
  <!-- Arrow pointing right -->
  <path d="M30 26 L38 26" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M35 23 L39 26 L35 29" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow pointing left -->
  <path d="M26 38 L34 38" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M29 35 L25 38 L29 41" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
